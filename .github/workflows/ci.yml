name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-test-ios:
    name: iOS Build + Tests
    runs-on: macos-15
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Show toolchain
        run: |
          xcodebuild -version
          sw_vers

      - name: Install XcodeGen if missing
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Regenerate project
        run: xcodegen generate

      - name: Select available iPhone simulator
        id: simulator
        run: |
          SIMULATOR_ID="$(python3 - <<'PY'
          import json
          import subprocess

          data = json.loads(subprocess.check_output([
              "xcrun", "simctl", "list", "devices", "available", "-j"
          ]))

          candidates = []
          for runtime, devices in data["devices"].items():
              if "iOS" not in runtime:
                  continue
              for device in devices:
                  name = device.get("name", "")
                  if device.get("isAvailable") and name.startswith("iPhone"):
                      candidates.append((runtime, name, device["udid"]))

          if not candidates:
              raise SystemExit("No available iPhone simulator found on runner")

          def runtime_key(value: str) -> tuple[int, int]:
              version = value.split("iOS-")[-1].replace("-", ".")
              parts = [int(part) for part in version.split(".") if part.isdigit()]
              return tuple(parts + [0] * (2 - len(parts)))

          candidates.sort(key=lambda item: (runtime_key(item[0]), item[1]), reverse=True)
          print(candidates[0][2])
          PY
          )"
          echo "id=${SIMULATOR_ID}" >> "$GITHUB_OUTPUT"
          echo "Using simulator id: ${SIMULATOR_ID}"

      - name: Build (Simulator)
        run: |
          xcodebuild \
            -project Lumen.xcodeproj \
            -scheme Lumen \
            -destination "id=${{ steps.simulator.outputs.id }}" \
            build

      - name: Test (Unit tests)
        run: |
          xcodebuild \
            -project Lumen.xcodeproj \
            -scheme Lumen \
            -destination "id=${{ steps.simulator.outputs.id }}" \
            -skip-testing:LumenUITests \
            -enableCodeCoverage YES \
            -resultBundlePath build/TestResults.xcresult \
            test

      - name: Report code coverage
        if: always()
        run: |
          # Hard threshold is tracked in a future PR; this step makes coverage visible in logs.
          xcrun xccov view --report --json build/TestResults.xcresult \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          pct = d['lineCoverage'] * 100
          print(f'Code Coverage: {pct:.1f}%')
          " || echo "Coverage report unavailable (xccov requires a completed .xcresult)"

  lint-workflows:
    name: Workflow Sanity Dependency
    runs-on: ubuntu-latest
    steps:
      - name: Placeholder
        run: echo "Workflow sanity checks run in separate workflow-sanity.yml"
