name: Workflow Sanity

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: workflow-sanity-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  no-tabs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail on tabs in workflow files
        run: |
          python - <<'PY'
          import pathlib
          import sys

          root = pathlib.Path('.github/workflows')
          bad = []
          for path in list(root.rglob('*.yml')) + list(root.rglob('*.yaml')):
            if b'\t' in path.read_bytes():
              bad.append(str(path))

          if bad:
            print('Tabs found in workflow file(s):')
            for p in bad:
              print(f'- {p}')
            sys.exit(1)
          PY

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          set -euo pipefail
          ver="1.7.11"
          archive="actionlint_${ver}_linux_amd64.tar.gz"
          base="https://github.com/rhysd/actionlint/releases/download/v${ver}"
          curl -sSfL -o "${archive}" "${base}/${archive}"
          curl -sSfL -o checksums.txt "${base}/actionlint_${ver}_checksums.txt"
          grep " ${archive}$" checksums.txt | sha256sum -c -
          tar -xzf "${archive}" actionlint
          sudo install -m 0755 actionlint /usr/local/bin/actionlint

      - name: Lint workflows
        run: actionlint
