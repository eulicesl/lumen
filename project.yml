name: Lumen
options:
  bundleIdPrefix: com.eulices
  defaultConfig: Release
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: 8394UJXX4F
    CODE_SIGN_IDENTITY: Apple Development
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    CODE_SIGN_STYLE: Automatic
configs:
  Debug: debug
  Release: release
targets:
  Lumen:
    type: application
    platform: iOS
    sources:
      - path: Lumen
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Lumen/Resources
    info:
      path: Lumen/Resources/Info.plist
      properties:
        BGTaskSchedulerPermittedIdentifiers:
          - com.lumen.spotlight-index
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: Lumen uses your microphone to capture voice input for dictation.
        NSSpeechRecognitionUsageDescription: Lumen transcribes your speech so you can send voice input as chat messages.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eulices.lumen
        CODE_SIGN_IDENTITY: Apple Development
        INFOPLIST_KEY_CFBundleDisplayName: Lumen
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSRemindersUsageDescription: Lumen uses Reminders to create and manage tasks.
        INFOPLIST_KEY_NSCalendarsUsageDescription: Lumen uses Calendar to create and manage events.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: Lumen uses your photo library for image analysis.
        INFOPLIST_KEY_NSCameraUsageDescription: Lumen uses your camera for image analysis.
    scheme:
      testTargets:
        - LumenTests
        - LumenUITests

  LumenWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: LumenWidget
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eulices.lumen.widget
        INFOPLIST_FILE: LumenWidget/Info.plist
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
    dependencies:
      - target: Lumen

  LumenTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LumenTests
    dependencies:
      - target: Lumen
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eulices.lumen.tests
        GENERATE_INFOPLIST_FILE: YES

  LumenUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LumenUITests
    dependencies:
      - target: Lumen
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.eulices.lumen.uitests
        GENERATE_INFOPLIST_FILE: YES
